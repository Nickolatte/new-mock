{% extends "base.html" %} {% block title %}Add Room{% endblock %} {% block
content %}

<h2>Add Room</h2>

<form method="POST">
  <label>Room Type</label>
  <input type="text" name="room_type" class="form-control" required />

  <label>Room Number</label>
  <input type="text" name="room_number" class="form-control" min="1" required />

  <label>Max Adults</label>
  <input
    type="number"
    name="max_adults"
    class="form-control"
    min="1"
    value="1"
    required
  />

  <label>Max Children</label>
  <input
    type="number"
    name="max_children"
    class="form-control"
    min="0"
    value="0"
    required
  />

  <label>Price Per Night</label>
  <input type="number" step="0.01" name="price" class="form-control" required />

  <button class="btn btn-primary mt-3">Add Room</button>
</form>

{% endblock %}
