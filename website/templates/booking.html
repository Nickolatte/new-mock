{% extends "base.html" %} {% block title %}Booking{% endblock %} {% block
content %}
<h2 class="text-center mt-4">Book Zoo Tickets</h2>

<form method="POST" class="mt-4" id="bookingForm">
  <label>Date</label>
  <input type="date" class="date_str form-control" required name="date" />

  <label class="mt-3">Adults</label>
  <input
    type="number"
    class="adultticket form-control"
    required
    name="adults"
    min="1"
    value="1"
  />

  <label class="mt-3">Children</label>
  <input
    type="number"
    class="childrenticket form-control"
    name="children"
    min="0"
    value="0"
  />

  <div class="mt-3">
    <p>Breakdown:</p>
    <ul>
      <li>Adults (£17.50 each): <span id="adultPriceBreakdown">£0.00</span></li>
      <li>
        Children (£14.50 each): <span id="childPriceBreakdown">£0.00</span>
      </li>
    </ul>
    <strong>Total Price: £<span id="totalPrice">0.00</span></strong>
  </div>

  <button type="submit" class="btn btn-primary mt-4 w-100">Book Now</button>

  <h4 class="mt-3">Need a Hotel Room? Book <a href="/hotelbooking">here</a></h4>
</form>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const adultInput = document.querySelector('input[name="adults"]');
    const childInput = document.querySelector('input[name="children"]');
    const totalPriceEl = document.getElementById("totalPrice");
    const adultBreakdownEl = document.getElementById("adultPriceBreakdown");
    const childBreakdownEl = document.getElementById("childPriceBreakdown");

    const adultPrice = 17.5;
    const childPrice = 14.5;

    function calculatePrice() {
      const adults = parseInt(adultInput.value) || 0;
      const children = parseInt(childInput.value) || 0;

      const adultTotal = adults * adultPrice;
      const childTotal = children * childPrice;
      const total = adultTotal + childTotal;

      adultBreakdownEl.textContent = "£" + adultTotal.toFixed(2);
      childBreakdownEl.textContent = "£" + childTotal.toFixed(2);
      totalPriceEl.textContent = total.toFixed(2);
    }

    adultInput.addEventListener("input", calculatePrice);
    childInput.addEventListener("input", calculatePrice);

    calculatePrice();
  });
</script>
{% endblock %}
